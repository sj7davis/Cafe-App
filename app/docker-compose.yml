version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: b1_platform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 10

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/b1_platform
      JWT_SECRET: change-me-in-production
      PLATFORM_ADMIN_SECRET: change-me-in-production
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
