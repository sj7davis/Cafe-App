version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: b1_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 10

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/b1_platform
      JWT_SECRET: change-me-in-production
      PLATFORM_ADMIN_SECRET: change-me-in-production
      NODE_ENV: production
      PORT: 3001
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
