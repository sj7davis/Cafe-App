name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # vite build does NOT type-check, so these two steps are the real gate
      # against frontend/backend contract drift.
      - name: Type-check frontend + api
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Type-check server
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Build
        run: npm run build

      # Frontend↔API contract tests — replay real frontend payloads against
      # each tRPC procedure's zod input schema.
      - name: Test
        run: npm test

      # Blocking. Zero errors allowed; the warning ceiling is a ratchet —
      # lower it as the `no-explicit-any` backlog is paid down, never raise it.
      - name: Lint
        run: npx eslint . --max-warnings 511
